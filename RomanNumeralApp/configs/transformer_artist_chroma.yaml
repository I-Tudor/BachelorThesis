model: RNATransformer

run_name: "major-tom-full"

num_epochs: 100

# --- Components that make up the final MAJOR TOM model (thesis Table 8.1) ---
augment: true              # pitch-transposition data augmentation
label_smoothing: 0.1       # uniform label smoothing on the non-key tasks
use_tonal_key_loss: true   # tonal-distance (circle-of-fifths) key smoothing
tonal_key_alpha: 0.15      # strength of the tonal-distance smoothing
warmup_epochs: 10          # linear LR warmup before cosine decay

# --- Components evaluated but left disabled: they did not improve results, ---
# --- so they are not part of the final model reported in the thesis.       ---
use_equiv_loss: false      # equivalence-aware (enharmonic) RN training loss
add_chord_change_head: false  # auxiliary chord-change prediction head
# boundary_weight / boundary_margin: boundary-upweighted loss (off; default 1.0)
# consistency_weight: within-segment consistency loss (off; default 0.0)
# model_kwargs.tome_r: ToMe token merging (off; set to 0 below)


output_dir: experiments/transformer_artist_chroma_aug/

data:
  split_level: artist
  use_semitone_spectrum: false

dataloader:
  num_workers: 0
  batch_size: 256

optimizer:
  lr: 0.0005
  weight_decay: 0.01

model_kwargs:
  dropout: 0.4
  tome_r: 0                # ToMe token merging disabled (no improvement)
  d_model: 128
  num_layers: 4
  nhead: 4
  dim_feedforward: 512
